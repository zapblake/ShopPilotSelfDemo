[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@9",
  "pnpm install --frozen-lockfile",
  "pnpm exec prisma generate --schema=packages/db/prisma/schema.prisma"
]

[phases.build]
cmds = ["echo 'build complete'"]

[start]
cmd = "pnpm --filter @zapsight/queue run start"
